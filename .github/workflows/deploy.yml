name: Deploy to GitHub Pages

# WARNING: this file lives on the debug branch `debug/iphone-ctx-loss-ab`
# and temporarily triggers a Pages deploy from that branch (next on:
# block) so an iPhone can hit the build for an A/B test of the
# `installContextLossHandlers` listener. THIS BRANCH MUST NEVER BE
# MERGED INTO main. After the test, restore prod by running
# `workflow_dispatch` on main from the Actions UI (or CLI). The branch
# is kept alive for further A/B bisects.

on:
  push:
    branches:
      - main
      - debug/iphone-ctx-loss-ab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
