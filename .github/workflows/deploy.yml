name: Deploy to GitHub Pages

# WARNING: this branch (`debug/iphone-ctx-loss-ab`) currently has its
# Pages deploy trigger ENABLED for an iPhone diagnostic round (the
# `?hit-debug=1` probe). Pushing here replaces /triton-wars/ until
# `workflow_dispatch` on main restores production. THIS BRANCH MUST
# NEVER BE MERGED INTO main. Disable the trigger again after the run
# by removing `- debug/iphone-ctx-loss-ab` from `on.push.branches`.

on:
  push:
    branches:
      - main
      - debug/iphone-ctx-loss-ab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
