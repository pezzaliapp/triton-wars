name: Deploy to GitHub Pages

# This branch (`debug/iphone-ctx-loss-ab`) is kept alive for future
# iPhone A/B bisects — DO NOT MERGE INTO main. The deploy trigger for
# this branch was disabled after the first A/B run; re-add a
# `- debug/iphone-ctx-loss-ab` line under `on.push.branches` only when
# you need to publish this branch to /triton-wars/ again, and remove
# it again right after. Production restore is `workflow_dispatch` on
# main from the Actions UI.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
